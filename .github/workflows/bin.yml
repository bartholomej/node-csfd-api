name: 🚀 Release Binaries

on:
  release:
    types: [created]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: 📦 Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: 📦 Install dependencies
        run: yarn install --immutable

      - name: 🏗️ Build app
        run: yarn build

      - name: 🔨 Compile and Create tarballs
        run: |
          # 1. macOS ARM
          bun build ./dist/cli.mjs --compile --target=bun-darwin-arm64 --outfile=csfd
          tar -czvf csfd-macos-arm64.tar.gz csfd

          # 2. macOS Intel
          bun build ./dist/cli.mjs --compile --target=bun-darwin-x64 --outfile=csfd
          tar -czvf csfd-macos-x64.tar.gz csfd

          # 3. Linux x64
          bun build ./dist/cli.mjs --compile --target=bun-linux-x64 --outfile=csfd
          tar -czvf csfd-linux-x64.tar.gz csfd

      - name: 📤 Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: csfd-*.tar.gz

      - name: 🧮 Calculate Hashes
        id: hashes
        run: |
          # Calculate SHA256 hashes and save them to GitHub environment variables
          echo "MAC_ARM_HASH=$(sha256sum csfd-macos-arm64.tar.gz | awk '{ print $1 }')" >> $GITHUB_ENV
          echo "MAC_INTEL_HASH=$(sha256sum csfd-macos-x64.tar.gz | awk '{ print $1 }')" >> $GITHUB_ENV
          echo "LINUX_HASH=$(sha256sum csfd-linux-x64.tar.gz | awk '{ print $1 }')" >> $GITHUB_ENV

      - name: 🚀 Update Homebrew Tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          # Clone the external tap repository
          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/${{ github.repository_owner }}/homebrew-tap.git tap-repo
          cd tap-repo

          # Extract the version number without the 'v' prefix
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          # Generate the Homebrew formula file dynamically
          cat << EOF > csfd.rb
          class Csfd < Formula
            desc "CSFD CLI tool and MCP server"
            homepage "${{ github.server_url }}/${{ github.repository }}"
            version "${VERSION}"

            on_macos do
              on_arm do
                url "${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/csfd-macos-arm64.tar.gz"
                sha256 "${MAC_ARM_HASH}"
              end
              on_intel do
                url "${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/csfd-macos-x64.tar.gz"
                sha256 "${MAC_INTEL_HASH}"
              end
            end

            on_linux do
              url "${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/csfd-linux-x64.tar.gz"
              sha256 "${LINUX_HASH}"
            end

            def install
              bin.install "csfd"
            end
          end
          EOF

          # Commit and push the updated formula to the tap repository
          git config user.name "BART!"
          git config user.email "bartholomej@users.noreply.github.com"
          git add csfd.rb

          # Create a commit and add GitHub Actions bot as a co-author
          git commit -m "chore(csfd): Update CSFD formula to version ${VERSION}" -m "Co-authored-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          git push
